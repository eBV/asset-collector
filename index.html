<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asset Collector</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
:root {
    --pink: #FE517E;
    --white: #FFFFFF;
    --yellow: #F1C40F;
    --burgundy: #3C0010;
    --black: #000000;
    --border-w: 3px;
    --radius-outer: 16px;
    --radius-inner: 12px;
    --font-display: 'Epilogue', sans-serif;
    --font-mono: 'Space Mono', monospace;
    --pad: 32px;
    /* ── Motion tokens ── */
    --transition-fast: 200ms;
    --transition-base: 300ms;
    --transition-slow: 500ms;
    --ease: cubic-bezier(0.4, 0, 0.2, 1);
    --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
}
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}
body {
    background-color: var(--pink);
    background-image: radial-gradient(var(--burgundy) 1px, transparent 1px);
    background-size: 24px 24px;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: var(--font-display);
    color: var(--black);
    padding: var(--pad);
    overflow: hidden;
}

/* ── Entrance keyframes ── */
@keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
}
@keyframes scaleInOnly {
    from { transform: scale(0.6); }
    to   { transform: scale(1); }
}

/* ── Frame ── */
.app-frame {
    width: 100%;
    height: calc(100vh - var(--pad) * 2);
    background-color: var(--black);
    border: var(--border-w) solid var(--black);
    border-radius: var(--radius-outer);
    box-shadow: 12px 12px 0px var(--burgundy);
    display: grid;
    grid-template-rows: auto 1fr;
    gap: var(--border-w);
    overflow: hidden;
    position: relative;
    animation: fadeUp var(--transition-slow) var(--ease) both;
}

/* ── Status bar ── */
.status-bar {
    background-color: var(--yellow);
    padding: 8px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: -0.5px;
}
.status-left {
    display: flex;
    align-items: center;
    gap: 6px;
}
.blink-dot {
    width: 8px;
    height: 8px;
    background-color: var(--black);
    border-radius: 50%;
    animation: blink 1.5s infinite;
    flex-shrink: 0;
}
@keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0; }
}
.status-badge {
    border: 1.5px solid var(--black);
    border-radius: 20px;
    padding: 2px 10px;
    background: var(--white);
}

/* ── Main: two-panel on desktop, stacked on mobile ── */
.main-content {
    display: grid;
    grid-template-columns: 1fr 1fr;
    overflow: hidden;
    height: 100%;
}

/* ── Left / Hero panel ── */
.hero-panel {
    background: var(--pink);
    padding: 48px 52px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
    border-right: var(--border-w) solid var(--black);
}

/* big decorative shapes */
.hero-deco-ring {
    position: absolute;
    border: var(--border-w) solid var(--black);
    border-radius: 50%;
    pointer-events: none;
}
.ring-1 {
    width: 280px;
    height: 280px;
    background: var(--yellow);
    bottom: -80px;
    right: -80px;
    box-shadow: 6px 6px 0 var(--black);
    opacity: 0.9;
    animation: scaleInOnly var(--transition-slow) var(--ease-spring) 0.10s both;
}
.ring-2 {
    width: 140px;
    height: 140px;
    background: var(--white);
    bottom: 80px;
    right: 80px;
    box-shadow: 4px 4px 0 var(--black);
    opacity: 0.85;
    animation: scaleInOnly var(--transition-slow) var(--ease-spring) 0.20s both;
}
.ring-3 {
    width: 60px;
    height: 60px;
    background: var(--burgundy);
    top: 32px;
    right: 40px;
    box-shadow: 3px 3px 0 var(--black);
    animation: scaleInOnly var(--transition-slow) var(--ease-spring) 0.05s both;
}

.hero-heading {
    font-size: clamp(4rem, 7.5vw, 9rem);
    font-weight: 900;
    line-height: 0.88;
    letter-spacing: -4px;
    color: var(--white);
    text-shadow: 4px 4px 0px var(--black);
    position: relative;
    z-index: 2;
    animation: fadeUp var(--transition-base) var(--ease) 0.15s both;
}

.hero-sub {
    font-family: var(--font-mono);
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--burgundy);
    background: var(--white);
    border: 2px solid var(--black);
    border-radius: 99px;
    padding: 6px 14px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    box-shadow: 3px 3px 0 var(--black);
    position: relative;
    z-index: 2;
    width: fit-content;
    animation: fadeUp var(--transition-base) var(--ease) 0.25s both;
}

.deco-waveform {
    display: flex;
    align-items: flex-end;
    gap: 4px;
    height: 48px;
    position: relative;
    z-index: 2;
    animation: fadeIn var(--transition-base) var(--ease) 0.35s both;
}
.deco-waveform span {
    display: block;
    width: 5px;
    background: var(--white);
    border-radius: 2px;
    opacity: 0.5;
    /* FIX: anchor scaleY from the bottom so bars grow upward, not from center */
    transform-origin: bottom;
    animation: wave 1.2s ease-in-out infinite alternate;
    will-change: transform;
}
.deco-waveform span:nth-child(1)  { height: 14px; animation-delay: 0.0s; }
.deco-waveform span:nth-child(2)  { height: 28px; animation-delay: 0.1s; }
.deco-waveform span:nth-child(3)  { height: 36px; animation-delay: 0.2s; }
.deco-waveform span:nth-child(4)  { height: 20px; animation-delay: 0.3s; }
.deco-waveform span:nth-child(5)  { height: 44px; animation-delay: 0.4s; }
.deco-waveform span:nth-child(6)  { height: 24px; animation-delay: 0.5s; }
.deco-waveform span:nth-child(7)  { height: 32px; animation-delay: 0.6s; }
.deco-waveform span:nth-child(8)  { height: 16px; animation-delay: 0.7s; }
.deco-waveform span:nth-child(9)  { height: 40px; animation-delay: 0.8s; }
.deco-waveform span:nth-child(10) { height: 12px; animation-delay: 0.9s; }
.deco-waveform span:nth-child(11) { height: 26px; animation-delay: 1.0s; }
.deco-waveform span:nth-child(12) { height: 38px; animation-delay: 1.1s; }
.deco-waveform span:nth-child(13) { height: 18px; animation-delay: 1.2s; }
.deco-waveform span:nth-child(14) { height: 46px; animation-delay: 1.3s; }
.deco-waveform span:nth-child(15) { height: 22px; animation-delay: 1.4s; }
@keyframes wave {
    from { transform: scaleY(0.35); }
    to   { transform: scaleY(1); }
}

/* ── Right / Form panel ── */
.form-panel {
    background: var(--white);
    padding: 48px 52px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 24px;
    overflow: hidden;
}

/* Staggered entrance for each form section */
.form-panel > *:nth-child(1) { animation: fadeUp var(--transition-base) var(--ease) 0.15s both; }
.form-panel > *:nth-child(2) { animation: fadeIn var(--transition-base) var(--ease) 0.22s both; }
.form-panel > *:nth-child(3) { animation: fadeUp var(--transition-base) var(--ease) 0.28s both; }
.form-panel > *:nth-child(4) { animation: fadeIn var(--transition-base) var(--ease) 0.34s both; }
.form-panel > *:nth-child(5) { animation: fadeUp var(--transition-base) var(--ease) 0.40s both; }

.form-label {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--burgundy);
    opacity: 0.6;
}

.source-chips {
    display: flex;
    flex-wrap: wrap;
}
.chip {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    font-weight: 700;
    padding: 5px 12px;
    border: 2px solid var(--black);
    border-radius: 99px;
    background: var(--white);
    box-shadow: 2px 2px 0px var(--black);
    user-select: none;
    margin-right: 8px;
}
.chip:last-child { margin-right: 0; }
.chip-yt { background: var(--yellow); }
.chip-sc {
    background: var(--pink);
    color: var(--white);
    text-shadow: 1px 1px 0 var(--black);
    overflow: hidden;
    white-space: nowrap;
    max-width: 120px;
    transition:
        max-width          var(--transition-base) var(--ease),
        padding-left       var(--transition-base) var(--ease),
        padding-right      var(--transition-base) var(--ease),
        margin-right       var(--transition-base) var(--ease),
        border-left-width  var(--transition-base) var(--ease),
        border-right-width var(--transition-base) var(--ease),
        opacity            var(--transition-fast) var(--ease);
}
.chip-sc.hidden {
    max-width: 0;
    padding-left: 0;
    padding-right: 0;
    margin-right: 0;
    border-left-width: 0;
    border-right-width: 0;
    opacity: 0;
    pointer-events: none;
}
.chip-tw { background: #9146FF; color: var(--white); border-color: var(--black); }

.ref-divider {
    height: 2px;
    background: repeating-linear-gradient(
        90deg,
        var(--black) 0px,
        var(--black) 6px,
        transparent 6px,
        transparent 12px
    );
    opacity: 0.12;
    border-radius: 1px;
}

.url-input {
    width: 100%;
    padding: 16px 20px;
    font-family: var(--font-display);
    font-size: 1rem;
    font-weight: 700;
    color: var(--black);
    border: var(--border-w) solid var(--black);
    border-radius: var(--radius-inner);
    background: var(--white);
    box-shadow: 4px 4px 0px var(--black);
    outline: none;
    /* FIX: specific properties instead of 'all'; use motion tokens */
    transition:
        box-shadow var(--transition-fast) var(--ease),
        transform  var(--transition-fast) var(--ease-spring);
}
.url-input::placeholder {
    color: #aaa;
    font-weight: 400;
}
.url-input:focus {
    box-shadow: 6px 6px 0px var(--burgundy);
    transform: translate(-2px, -2px);
}

.status-msg {
    font-family: var(--font-mono);
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--burgundy);
    min-height: 1rem;
    letter-spacing: -0.3px;
}
.status-msg.error { color: var(--pink); }
.status-msg.ok    { color: #1a7a3c; }

.download-btn {
    width: 100%;
    padding: 18px 24px;
    font-family: var(--font-display);
    font-size: 1.15rem;
    font-weight: 900;
    letter-spacing: -0.5px;
    color: var(--white);
    text-shadow: 2px 2px 0px var(--black);
    background: var(--pink);
    border: var(--border-w) solid var(--black);
    border-radius: var(--radius-inner);
    box-shadow: 6px 6px 0px var(--black);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    /* FIX: specific GPU-friendly properties instead of 'all'; use motion tokens */
    transition:
        background-color var(--transition-fast) var(--ease),
        transform        var(--transition-fast) var(--ease-spring),
        box-shadow       var(--transition-fast) var(--ease);
    position: relative;
    overflow: hidden;
    will-change: transform;
}
.download-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
        -45deg,
        transparent,
        transparent 8px,
        rgba(255,255,255,0.07) 8px,
        rgba(255,255,255,0.07) 10px
    );
    pointer-events: none;
}
.download-btn:active:not(:disabled) {
    transform: translate(6px, 6px);
    box-shadow: 0px 0px 0px var(--black);
}
.download-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
    box-shadow: 6px 6px 0px var(--black);
    will-change: auto;
}
.download-btn svg {
    width: 22px;
    height: 22px;
    stroke: var(--white);
    stroke-width: 3;
    stroke-linecap: round;
    stroke-linejoin: round;
    fill: none;
    filter: drop-shadow(1px 1px 0 var(--black));
    flex-shrink: 0;
}

.format-toggle {
    display: inline-flex;
    border: 2px solid var(--black);
    border-radius: 99px;
    overflow: hidden;
    box-shadow: 3px 3px 0 var(--black);
    width: fit-content;
}
.toggle-opt {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    font-weight: 700;
    padding: 5px 14px;
    border: none;
    background: var(--white);
    color: var(--black);
    cursor: pointer;
    /* FIX: use motion tokens */
    transition:
        background-color var(--transition-fast) var(--ease),
        color            var(--transition-fast) var(--ease);
    letter-spacing: 0.5px;
}
.toggle-opt:first-child {
    border-right: 2px solid var(--black);
}
.toggle-opt.active {
    background: var(--burgundy);
    color: var(--white);
}

.spinner {
    display: none;
    width: 20px;
    height: 20px;
    border: 3px solid rgba(255,255,255,0.35);
    border-top-color: var(--white);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Hover states — touch-device safe ── */
@media (hover: hover) {
    .url-input:hover:not(:focus) {
        box-shadow: 5px 5px 0px var(--black);
        transform: translate(-1px, -1px);
    }

    .download-btn:hover:not(:disabled) {
        background-color: var(--burgundy);
        transform: translate(-2px, -2px);
        box-shadow: 8px 8px 0px var(--black);
    }

    .toggle-opt:not(.active):hover {
        background-color: var(--yellow);
    }
}

/* ── Mobile fallback ── */
@media (max-width: 767px) {
    :root { --pad: 16px; }
    body { overflow: auto; }
    .app-frame { height: auto; min-height: calc(100vh - 32px); grid-template-rows: auto 1fr; }
    .main-content { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
    .hero-panel {
        padding: 28px 24px 32px;
        border-right: none;
        border-bottom: var(--border-w) solid var(--black);
        min-height: 220px;
        justify-content: flex-start;
        gap: 16px;
    }
    .ring-1 { width: 160px; height: 160px; bottom: -50px; right: -50px; }
    .ring-2 { width: 80px; height: 80px; bottom: 40px; right: 40px; }
    .ring-3 { width: 40px; height: 40px; top: 20px; right: 20px; }
    .hero-heading { font-size: 3.2rem; letter-spacing: -2px; }
    .form-panel { padding: 28px 24px; gap: 18px; }
}

/* ── Reduced motion — disable non-essential animations ── */
@media (prefers-reduced-motion: reduce) {
    /* Stop decorative continuous animations */
    .blink-dot { animation: none; opacity: 1; }
    .deco-waveform span { animation: none; transform: scaleY(0.7); }
    .spinner { animation: none; }

    /* Cancel all entrance animations — elements appear immediately */
    .app-frame,
    .hero-heading,
    .hero-sub,
    .deco-waveform,
    .ring-1, .ring-2, .ring-3,
    .form-panel > * {
        animation: none;
        opacity: 1;
        transform: none;
    }

    /* Make all transitions instant */
    *,
    *::before,
    *::after {
        transition-duration: 0.01ms !important;
    }
}
    </style>
</head>
<body>

<div class="app-frame">

    <!-- Status bar -->
    <div class="status-bar">
        <div class="status-left">
            <div class="blink-dot"></div>
            <span>Asset Collector</span>
        </div>
        <div class="status-badge">v1.0</div>
    </div>

    <!-- Two-panel main -->
    <div class="main-content">

        <!-- LEFT: Branding -->
        <div class="hero-panel">
            <div class="hero-heading">ASSET<br>COL·<br>LECT.</div>

            <div class="hero-sub">
                <span>●</span> Extract · Convert · Own
            </div>

            <div class="deco-waveform" aria-hidden="true">
                <span></span><span></span><span></span><span></span>
                <span></span><span></span><span></span><span></span>
                <span></span><span></span><span></span><span></span>
                <span></span><span></span><span></span>
            </div>

            <!-- Decorative rings -->
            <div class="hero-deco-ring ring-1"></div>
            <div class="hero-deco-ring ring-2"></div>
            <div class="hero-deco-ring ring-3"></div>
        </div>

        <!-- RIGHT: Form -->
        <div class="form-panel">

            <div>
                <p class="form-label" style="margin-bottom:10px;">Supported sources</p>
                <div class="source-chips">
                    <span class="chip chip-sc">SoundCloud</span>
                    <span class="chip chip-yt">YouTube</span>
                    <span class="chip chip-tw">Twitch</span>
                </div>
            </div>

            <div class="ref-divider"></div>

            <div>
                <p class="form-label" style="margin-bottom:10px;">Asset URL</p>
                <input
                    type="url"
                    id="urlInput"
                    class="url-input"
                    placeholder="Paste a YouTube / SoundCloud / Twitch URL…"
                    autocomplete="off"
                    spellcheck="false"
                >
            </div>

            <p class="status-msg" id="statusMsg">&nbsp;</p>

            <div style="display:flex; align-items:center; justify-content:space-between; width:100%;">
                <button class="download-btn" id="downloadBtn" aria-label="Collect asset" style="flex:1; margin-right:12px;">
                    <div class="spinner" id="spinner"></div>
                    <svg id="btnIcon" viewBox="0 0 24 24">
                        <path d="M12 3v13M7 11l5 5 5-5"/>
                        <path d="M3 20h18"/>
                    </svg>
                    <span id="btnLabel">COLLECT ASSET — MP3</span>
                </button>

                <div class="format-toggle">
                    <button class="toggle-opt active" id="toggleMp3">MP3</button>
                    <button class="toggle-opt"        id="toggleMp4">MP4</button>
                </div>
            </div>

        </div><!-- /.form-panel -->

    </div><!-- /.main-content -->

</div><!-- /.app-frame -->

<script>
(function () {
    const input     = document.getElementById('urlInput');
    const statusMsg = document.getElementById('statusMsg');
    const btn       = document.getElementById('downloadBtn');
    const spinner   = document.getElementById('spinner');
    const btnIcon   = document.getElementById('btnIcon');
    const btnLabel  = document.getElementById('btnLabel');
    const toggleMp3 = document.getElementById('toggleMp3');
    const toggleMp4 = document.getElementById('toggleMp4');
    const chipSc    = document.querySelectorAll('.chip-sc');

    let format = 'mp3';

    function setFormat(f) {
        format = f;
        const isMp4 = f === 'mp4';
        toggleMp3.classList.toggle('active', !isMp4);
        toggleMp4.classList.toggle('active',  isMp4);
        btnLabel.textContent = isMp4 ? 'COLLECT ASSET — MP4' : 'COLLECT ASSET — MP3';
        chipSc.forEach(c => c.classList.toggle('hidden', isMp4));
        setStatus('');
    }

    toggleMp3.addEventListener('click', () => setFormat('mp3'));
    toggleMp4.addEventListener('click', () => setFormat('mp4'));

    function setStatus(text, type = '') {
        statusMsg.textContent = text || '\u00a0';
        statusMsg.className   = 'status-msg' + (type ? ' ' + type : '');
    }

    function setLoading(on) {
        btn.disabled              = on;
        toggleMp3.disabled        = on;
        toggleMp4.disabled        = on;
        spinner.style.display     = on ? 'block' : 'none';
        btnIcon.style.display     = on ? 'none'  : 'block';
        btnLabel.textContent      = on
            ? (format === 'mp4' ? 'FETCHING VIDEO…' : 'COLLECTING…')
            : (format === 'mp4' ? 'COLLECT ASSET — MP4' : 'COLLECT ASSET — MP3');
    }

    function isValidUrl(str) {
        try {
            const u = new URL(str);
            return u.protocol === 'http:' || u.protocol === 'https:';
        } catch { return false; }
    }

    btn.addEventListener('click', async () => {
        const url = input.value.trim();

        if (!url) { setStatus('⚠ Paste a URL first.', 'error'); input.focus(); return; }
        if (!isValidUrl(url)) { setStatus('⚠ That doesn\'t look like a valid URL.', 'error'); input.focus(); return; }

        setStatus(format === 'mp4'
            ? 'Fetching video… large files can take a minute'
            : 'Collecting asset… this can take 10–30 s'
        );
        setLoading(true);

        try {
            const response = await fetch(`/convert?url=${encodeURIComponent(url)}&format=${format}`);

            if (!response.ok) {
                const { error } = await response.json().catch(() => ({ error: `HTTP ${response.status}` }));
                throw new Error(error);
            }

            const cd       = response.headers.get('content-disposition') || '';
            const match    = cd.match(/filename="(.+?)"/);
            const filename = match ? match[1] : `asset.${format}`;

            const blob        = await response.blob();
            const downloadUrl = URL.createObjectURL(blob);
            const a           = document.createElement('a');
            a.href            = downloadUrl;
            a.download        = filename;
            document.body.appendChild(a);
            a.click();
            a.remove();
            URL.revokeObjectURL(downloadUrl);

            setStatus(`✓ ${format === 'mp4' ? 'Video' : 'Asset'} collected!`, 'ok');
        } catch (err) {
            console.error(err);
            setStatus('⚠ ' + (err.message || 'Something went wrong.'), 'error');
        } finally {
            setLoading(false);
        }
    });

    input.addEventListener('input', () => setStatus(''));
})();
</script>
</body>
</html>
